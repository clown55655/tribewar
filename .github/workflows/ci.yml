name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          files="$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          mkdir -p bin
          go build -o bin/tribeway ./cmd

      - name: Build tools
        run: |
          mkdir -p bin
          go build -o bin/migrate ./tools/migrate
          go build -o bin/loadtest ./tools/loadtest
